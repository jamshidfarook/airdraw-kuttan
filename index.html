<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUTTAN · AirDraw ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;cursor:none;font-family:'Share Tech Mono',monospace;}

/* ── LAYER STACK ── */
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;}
#drawCanvas{position:fixed;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;}
#particleCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;}
#uiCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;}
#scanline{position:fixed;inset:0;pointer-events:none;z-index:4;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:3;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,0.55) 100%);}

/* ── BOOT ── */
#boot{
  position:fixed;inset:0;z-index:200;
  background:radial-gradient(ellipse at 50% 40%,#04001a 0%,#010008 60%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  overflow:hidden;transition:opacity 1.4s cubic-bezier(0.4,0,0.2,1);
}
#boot.fade{opacity:0;pointer-events:none;}
#bootParticleCanvas{position:absolute;inset:0;}

.b-frame{position:absolute;inset:0;pointer-events:none;}
.b-corner{position:absolute;width:80px;height:80px;transition:all 1s ease;}
.b-corner.tl{top:24px;left:24px;border-top:1px solid rgba(180,80,255,0.5);border-left:1px solid rgba(180,80,255,0.5);}
.b-corner.tr{top:24px;right:24px;border-top:1px solid rgba(180,80,255,0.5);border-right:1px solid rgba(180,80,255,0.5);}
.b-corner.bl{bottom:24px;left:24px;border-bottom:1px solid rgba(180,80,255,0.5);border-left:1px solid rgba(180,80,255,0.5);}
.b-corner.br{bottom:24px;right:24px;border-bottom:1px solid rgba(180,80,255,0.5);border-right:1px solid rgba(180,80,255,0.5);}

.b-content{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:2;}

.b-logo{
  font-family:'Orbitron',sans-serif;font-size:52px;font-weight:900;
  letter-spacing:0.35em;
  background:linear-gradient(135deg,#a020f0 0%,#e040ff 30%,#ffaa00 65%,#ff6600 100%);
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoShimmer 4s linear infinite,logoPulse 2s ease-in-out infinite;
  filter:drop-shadow(0 0 30px rgba(160,32,240,0.8));
}
@keyframes logoShimmer{0%{background-position:0%}100%{background-position:300%}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 30px rgba(160,32,240,0.8));}50%{filter:drop-shadow(0 0 60px rgba(224,64,255,1)) drop-shadow(0 0 100px rgba(255,170,0,0.5));}}

.b-tagline{font-size:11px;letter-spacing:0.5em;color:rgba(255,180,80,0.6);text-transform:uppercase;animation:fadeInUp 0.6s 0.3s both;}
.b-divider{width:360px;height:1px;background:linear-gradient(90deg,transparent,rgba(160,32,240,0.6),rgba(255,170,0,0.5),transparent);animation:fadeInUp 0.6s 0.5s both;}

.b-credit{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 44px;
  border:1px solid rgba(160,32,240,0.25);border-radius:3px;
  background:rgba(80,0,160,0.08);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  animation:fadeInUp 0.6s 0.7s both;
}
.b-credit-label{font-size:8px;letter-spacing:0.5em;color:rgba(255,180,60,0.45);text-transform:uppercase;}
.b-credit-name{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:600;
  color:#ffcc44;letter-spacing:0.25em;
  text-shadow:0 0 24px rgba(255,200,60,0.9),0 0 50px rgba(255,140,0,0.4);
  animation:namePulse 2.5s ease-in-out infinite;
}
@keyframes namePulse{0%,100%{opacity:.9;}50%{opacity:1;text-shadow:0 0 36px rgba(255,210,80,1),0 0 80px rgba(255,140,0,0.6);}}

.b-bar-wrap{width:360px;height:2px;background:rgba(160,32,240,0.12);border-radius:2px;overflow:hidden;animation:fadeInUp 0.6s 0.9s both;}
.b-bar{height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,#6000cc,#b450ff,#ff9900,#ffcc44);
  box-shadow:0 0 16px rgba(180,80,255,1),0 0 32px rgba(255,180,0,0.5);
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.b-msg{font-size:9px;letter-spacing:0.3em;color:rgba(160,80,255,0.7);text-transform:uppercase;min-height:14px;animation:fadeInUp 0.6s 1s both;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(0,8,20,0.9);
  color:#00e5ff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:0.22em;padding:12px 28px;border-radius:2px;
  border-top:1px solid rgba(0,229,255,0.5);
  border-bottom:1px solid rgba(0,229,255,0.2);
  box-shadow:0 0 40px rgba(0,200,255,0.2),0 -1px 0 rgba(0,229,255,0.3);
  opacity:0;transition:opacity 0.2s,transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;white-space:nowrap;z-index:100;text-transform:uppercase;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MODE BADGE ── */
#modeBadge{
  position:fixed;top:50%;right:24px;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none;z-index:50;
  opacity:0;transition:opacity 0.3s;
}
#modeBadge.visible{opacity:1;}
.mode-item{
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:0.2em;padding:6px 12px;
  border-left:2px solid;border-radius:0 2px 2px 0;
  background:rgba(0,5,15,0.7);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
  transition:all 0.2s;
}
.mode-item.active{border-left-color:#00e5ff;color:#00e5ff;background:rgba(0,40,60,0.85);}
.mode-item.inactive{border-left-color:rgba(0,229,255,0.15);color:rgba(0,229,255,0.25);}
</style>
</head>
<body>

<div id="boot">
  <canvas id="bootParticleCanvas"></canvas>
  <div class="b-frame">
    <div class="b-corner tl"></div>
    <div class="b-corner tr"></div>
    <div class="b-corner bl"></div>
    <div class="b-corner br"></div>
  </div>
  <div class="b-content">
    <div class="b-logo">K·U·T·T·A·N</div>
    <div class="b-tagline">Air Draw Ultra · v4.0</div>
    <div class="b-divider"></div>
    <div class="b-credit">
      <div class="b-credit-label">Designed &amp; Engineered By</div>
      <div class="b-credit-name">Jamshid Farook</div>
    </div>
    <div class="b-divider"></div>
    <div class="b-bar-wrap"><div class="b-bar" id="bootBar"></div></div>
    <div class="b-msg" id="bootMsg">Initializing neural interface…</div>
  </div>
</div>

<div id="scanline"></div>
<div id="vignette"></div>
<video id="video" autoplay muted playsinline></video>
<canvas id="bgCanvas"></canvas>
<canvas id="drawCanvas"></canvas>
<canvas id="particleCanvas"></canvas>
<canvas id="uiCanvas"></canvas>
<div id="toast"></div>

<script type="module">
import{HandLandmarker,FilesetResolver}from"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm";

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const PALETTE=[
  '#00e5ff','#ff1744','#ff9100','#ffea00',
  '#69ff47','#d500f9','#ff4081','#ffffff',
  '#1a1a2e','#0a2463'
];
const PALETTE_NAMES=['CYAN','RED','ORANGE','YELLOW','GREEN','PURPLE','PINK','WHITE','VOID','NAVY'];
const BRUSH_SIZES=[2,5,10,18,30,50];
const BRUSH_MODES=['MARKER','GLOW','NEON','SPRAY','GLITTER','CHALK','ERASER'];
const BRUSH_MODE_ICONS=['▌','◉','⬟','✦','✶','▒','◌'];
const BG_THEMES=['CAMERA','AURORA','GRID'];

const CONNECTIONS=[
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

const G={NONE:'none',DRAW:'draw',COLOR:'color',SIZE:'size',FIST:'fist',SAVE:'save',MODE:'mode',UNDO:'undo'};
const LM_LABELS={0:'WRIST',4:'THUMB',8:'INDEX',12:'MIDDLE',16:'RING',20:'PINKY'};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let brushColor='#00e5ff';
let brushSize=5;
let brushModeIdx=0;
let bgThemeIdx=0;
let gesture=G.NONE,prevGesture=G.NONE;
let smoothX=null,smoothY=null;
let prevX=null,prevY=null;
let isDrawing=false;
let fistStart=null,selectCool=0;
const FIST_HOLD=2000;
let handDetected=false;
let frameCount=0,fps=0,fpsLast=performance.now();
let handLandmarker=null,lastFrameTime=0;
let colorOrbs=[],sizeOrbs=[],modeOrbs=[];
let strokeHistory=[]; // for undo
let currentStrokePts=[];
let bgPhase=0;

// Hover tracking — no sounds on hover
let lastColorHov=-1,lastSizeHov=-1,lastModeHov=-1;
// Track last selected item per picker — only play sound on NEW selection
let lastSelectedColor='',lastSelectedSize=-1,lastSelectedMode=-1;
// BG toggle: both hands fist → both hands open
let bothFistSeen=false;
// Gesture debounce — require N stable frames before committing
let pendingGesture=G.NONE,pendingFrames=0;
const GESTURE_DEBOUNCE=4;

// Particles
const particles=[];
const MAX_PARTICLES=350;

// Audio
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,type='sine',dur=0.08,vol=0.04){
  try{
    const ac=getAudio();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    osc.type=type;osc.frequency.setValueAtTime(freq,ac.currentTime);
    gain.gain.setValueAtTime(vol,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
    osc.start(ac.currentTime);osc.stop(ac.currentTime+dur);
  }catch(e){}
}
function playClick(){playTone(1200,'square',0.04,0.03);}
function playSelect(){playTone(880,'sine',0.12,0.05);setTimeout(()=>playTone(1100,'sine',0.1,0.04),60);}
function playDraw(){playTone(200+Math.random()*80,'sine',0.03,0.008);}

// ═══════════════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════════════
const video=document.getElementById('video');
const bgCanvas=document.getElementById('bgCanvas');
const drawCanvas=document.getElementById('drawCanvas');
const particleCanvas=document.getElementById('particleCanvas');
const uiCanvas=document.getElementById('uiCanvas');
const bCtx=bgCanvas.getContext('2d');
const dCtx=drawCanvas.getContext('2d');
const pCtx=particleCanvas.getContext('2d');
const uCtx=uiCanvas.getContext('2d');
const bootEl=document.getElementById('boot');
const bootBar=document.getElementById('bootBar');
const bootMsg=document.getElementById('bootMsg');
const toastEl=document.getElementById('toast');
const bootPC=document.getElementById('bootParticleCanvas');
const bpCtx=bootPC.getContext('2d');
let toastTimer=null;

function toast(msg,dur=2200){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),dur);
}

// ═══════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════
function buildOrbs(){
  const W=window.innerWidth,H=window.innerHeight;
  // Color orbs
  colorOrbs=[];
  const cN=PALETTE.length,cR=26,cGap=64;
  const cSX=W/2-((cN-1)*cGap)/2;
  for(let i=0;i<cN;i++)
    colorOrbs.push({x:cSX+i*cGap,y:H/2,r:cR,color:PALETTE[i],name:PALETTE_NAMES[i]});
  // Size orbs — uniform radius so they never overlap
  sizeOrbs=[];
  const sN=BRUSH_SIZES.length,sGap=100,sR=36;
  const sSX=W/2-((sN-1)*sGap)/2;
  for(let i=0;i<sN;i++)
    sizeOrbs.push({x:sSX+i*sGap,y:H/2,r:sR,size:BRUSH_SIZES[i]});
  // Mode orbs
  modeOrbs=[];
  const mN=BRUSH_MODES.length,mGap=90;
  const mSX=W/2-((mN-1)*mGap)/2;
  for(let i=0;i<mN;i++)
    modeOrbs.push({x:mSX+i*mGap,y:H/2,r:34,mode:BRUSH_MODES[i],icon:BRUSH_MODE_ICONS[i]});
}

function resize(){
  const W=window.innerWidth,H=window.innerHeight;
  [bgCanvas,drawCanvas,particleCanvas,uiCanvas].forEach(c=>{c.width=W;c.height=H;});
  bootPC.width=W;bootPC.height=H;
  buildOrbs();
}
window.addEventListener('resize',resize);
resize();

// ═══════════════════════════════════════════════════════════════
//  BOOT PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════
const bootParts=[];
for(let i=0;i<120;i++){
  bootParts.push({
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6,
    r:Math.random()*2+0.5,
    a:Math.random(),
    hue:Math.random()<0.7?280:40,
    phase:Math.random()*Math.PI*2
  });
}
let bootAnimFrame;
function animateBoot(t){
  bootAnimFrame=requestAnimationFrame(animateBoot);
  const W=bootPC.width,H=bootPC.height;
  bpCtx.clearRect(0,0,W,H);
  for(const p of bootParts){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    const a=0.3+0.3*Math.sin(t*0.001+p.phase);
    bpCtx.beginPath();
    bpCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bpCtx.fillStyle=`hsla(${p.hue},100%,70%,${a})`;
    bpCtx.shadowColor=`hsla(${p.hue},100%,70%,1)`;
    bpCtx.shadowBlur=6;
    bpCtx.fill();
  }
}
animateBoot(0);

// ═══════════════════════════════════════════════════════════════
//  BACKGROUND THEMES
// ═══════════════════════════════════════════════════════════════
let bgStars=[];
let bgGrid={};
let bgAuroraPhase=0;
let bgCircuitLines=[];

function initBgTheme(){
  bgStars=Array.from({length:200},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.5+0.3,
    twinkle:Math.random()*Math.PI*2,
    speed:Math.random()*0.02+0.005
  }));
  bgCircuitLines=Array.from({length:30},()=>({
    x:Math.random(),y:Math.random(),
    dir:Math.floor(Math.random()*4),
    len:Math.random()*0.2+0.05,
    pulse:Math.random()*Math.PI*2
  }));
}
initBgTheme();

function drawBgTheme(now){
  const W=bgCanvas.width,H=bgCanvas.height;
  bCtx.clearRect(0,0,W,H);
  const theme=BG_THEMES[bgThemeIdx];
  if(theme==='CAMERA')return;

  if(theme==='DEEP SPACE'){
    bCtx.fillStyle='#000005';bCtx.fillRect(0,0,W,H);
    // Nebula
    const ng=bCtx.createRadialGradient(W*0.3,H*0.4,0,W*0.3,H*0.4,W*0.5);
    ng.addColorStop(0,'rgba(40,0,80,0.3)');ng.addColorStop(1,'transparent');
    bCtx.fillStyle=ng;bCtx.fillRect(0,0,W,H);
    const ng2=bCtx.createRadialGradient(W*0.7,H*0.6,0,W*0.7,H*0.6,W*0.4);
    ng2.addColorStop(0,'rgba(0,30,60,0.3)');ng2.addColorStop(1,'transparent');
    bCtx.fillStyle=ng2;bCtx.fillRect(0,0,W,H);
    for(const s of bgStars){
      s.twinkle+=s.speed;
      const a=0.4+0.6*Math.abs(Math.sin(s.twinkle));
      bCtx.beginPath();bCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      bCtx.fillStyle=`rgba(255,255,255,${a})`;bCtx.shadowColor='white';bCtx.shadowBlur=s.r*4;
      bCtx.fill();
    }
  }else if(theme==='CIRCUIT'){
    bCtx.fillStyle='#000a08';bCtx.fillRect(0,0,W,H);
    bCtx.strokeStyle='rgba(0,255,100,0.07)';bCtx.lineWidth=1;
    // Grid lines
    for(let x=0;x<W;x+=40){bCtx.beginPath();bCtx.moveTo(x,0);bCtx.lineTo(x,H);bCtx.stroke();}
    for(let y=0;y<H;y+=40){bCtx.beginPath();bCtx.moveTo(0,y);bCtx.lineTo(W,y);bCtx.stroke();}
    // Circuit traces
    for(const l of bgCircuitLines){
      l.pulse+=0.02;
      const a=0.1+0.15*Math.abs(Math.sin(l.pulse));
      bCtx.strokeStyle=`rgba(0,255,150,${a})`;bCtx.lineWidth=1.5;
      bCtx.shadowColor='rgba(0,255,100,0.8)';bCtx.shadowBlur=4;
      const x=l.x*W,y=l.y*H,len=l.len*W;
      bCtx.beginPath();bCtx.moveTo(x,y);
      const dirs=[[1,0],[0,1],[-1,0],[0,-1]];
      bCtx.lineTo(x+dirs[l.dir][0]*len,y+dirs[l.dir][1]*len);
      bCtx.stroke();
    }
    bCtx.shadowBlur=0;
  }else if(theme==='AURORA'){
    bCtx.fillStyle='#000510';bCtx.fillRect(0,0,W,H);
    bgAuroraPhase+=0.003;
    for(let i=0;i<5;i++){
      const t=bgAuroraPhase+i*0.4;
      const cx=W*(0.2+0.6*((Math.sin(t*0.7)+1)/2));
      const cy=H*(0.2+0.3*Math.sin(t*0.5+i));
      const grad=bCtx.createRadialGradient(cx,cy,0,cx,cy,W*0.4);
      const hue=120+i*40+Math.sin(t)*30;
      grad.addColorStop(0,`hsla(${hue},80%,50%,0.06)`);
      grad.addColorStop(1,'transparent');
      bCtx.fillStyle=grad;bCtx.fillRect(0,0,W,H);
    }
    for(const s of bgStars){
      s.twinkle+=s.speed;
      const a=0.2+0.3*Math.abs(Math.sin(s.twinkle));
      bCtx.beginPath();bCtx.arc(s.x*W,s.y*H,s.r*0.7,0,Math.PI*2);
      bCtx.fillStyle=`rgba(255,255,255,${a})`;bCtx.fill();
    }
  }else if(theme==='GRID'){
    bCtx.fillStyle='#010208';bCtx.fillRect(0,0,W,H);
    const gs=60;
    for(let x=0;x<W;x+=gs){
      for(let y=0;y<H;y+=gs){
        const a=0.04+0.02*Math.sin(now*0.0005+x*0.01+y*0.01);
        bCtx.strokeStyle=`rgba(0,150,255,${a})`;
        bCtx.lineWidth=0.5;
        bCtx.strokeRect(x,y,gs,gs);
      }
    }
    // Perspective grid center glow
    const gg=bCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.5);
    gg.addColorStop(0,'rgba(0,80,200,0.12)');gg.addColorStop(1,'transparent');
    bCtx.fillStyle=gg;bCtx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════════════════════
//  GESTURE DETECTION  (hand-agnostic — works for both hands)
// ═══════════════════════════════════════════════════════════════
function fingerUp(lm,tip,pip){return lm[tip].y<lm[pip].y;}

// Thumb tucked = tip is WELL inside the palm
// Uses ratio of thumb-tip-to-palm vs wrist-to-middle-knuckle hand size
// Strict threshold: thumb must be clearly pulled in, not just slightly bent
function thumbTucked(lm){
  const tip=lm[4], palm=lm[9];
  const dx=tip.x-palm.x, dy=tip.y-palm.y;
  const thumbDist=Math.sqrt(dx*dx+dy*dy);
  const w=lm[0], m=lm[9];
  const handSize=Math.sqrt((w.x-m.x)**2+(w.y-m.y)**2);
  // Also check thumb tip is close to index base (lm5) — confirms it's folded across
  const ib=lm[5];
  const dx2=tip.x-ib.x, dy2=tip.y-ib.y;
  const thumbToIndex=Math.sqrt(dx2*dx2+dy2*dy2);
  // Both checks must pass: close to palm center AND close to index base knuckle
  return thumbDist < handSize*0.5 && thumbToIndex < handSize*0.55;
}

function isFistGesture(lm){
  if(!lm||lm.length<21)return false;
  return !fingerUp(lm,8,6)&&!fingerUp(lm,12,10)&&!fingerUp(lm,16,14)&&!fingerUp(lm,20,18);
}

function isOpenGesture(lm){
  if(!lm||lm.length<21)return false;
  return fingerUp(lm,8,6)&&fingerUp(lm,12,10)&&fingerUp(lm,16,14)&&fingerUp(lm,20,18);
}

function detectGesture(lm){
  if(!lm||lm.length<21)return G.NONE;
  const iU=fingerUp(lm,8,6),mU=fingerUp(lm,12,10);
  const rU=fingerUp(lm,16,14),pU=fingerUp(lm,20,18);
  const tTucked=thumbTucked(lm);
  // All 4 fingers down = FIST (thumb ignored)
  if(!iU&&!mU&&!rU&&!pU)         return G.FIST;
  // Pinky only = SAVE (thumb ignored)
  if(pU&&!iU&&!mU&&!rU)          return G.SAVE;
  // All gestures below REQUIRE thumb tucked
  if(!tTucked)                    return G.NONE;
  // 4 fingers up + thumb tucked → MODE
  if(iU&&mU&&rU&&pU)             return G.MODE;
  // 3 fingers + thumb tucked → SIZE
  if(iU&&mU&&rU&&!pU)            return G.SIZE;
  // 2 fingers + thumb tucked → COLOR
  if(iU&&mU&&!rU&&!pU)           return G.COLOR;
  // Index only + thumb tucked → DRAW
  if(iU&&!mU&&!rU&&!pU)          return G.DRAW;
  return G.NONE;
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}
function hexToRgb(hex){
  return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
}
function lerpColor(c1,c2,t){
  const [r1,g1,b1]=hexToRgb(c1),[r2,g2,b2]=hexToRgb(c2);
  return`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════
function spawnParticles(x,y,color,mode){
  const count=mode==='GLITTER'?8:mode==='SPRAY'?6:mode==='NEON'?3:2;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*(mode==='GLITTER'?4:mode==='SPRAY'?5:2)+0.5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed*(mode==='SPRAY'?2:1),
      vy:Math.sin(angle)*speed-0.5,
      life:1,decay:mode==='GLITTER'?0.025:0.04+Math.random()*0.03,
      size:mode==='GLITTER'?Math.random()*3+1:Math.random()*brushSize*0.4+1,
      color,
      type:mode==='GLITTER'?'star':mode==='NEON'?'glow':'dot',
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.2
    });
  }
  if(particles.length>MAX_PARTICLES)particles.splice(0,particles.length-MAX_PARTICLES);
}

function updateParticles(){
  pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.06;
    p.life-=p.decay;
    p.rot+=p.rotV;
    if(p.life<=0){particles.splice(i,1);continue;}
    pCtx.save();
    pCtx.globalAlpha=p.life;
    if(p.type==='star'){
      pCtx.translate(p.x,p.y);pCtx.rotate(p.rot);
      pCtx.fillStyle=p.color;pCtx.shadowColor=p.color;pCtx.shadowBlur=8;
      const s=p.size;
      pCtx.beginPath();
      for(let k=0;k<4;k++){
        pCtx.lineTo(Math.cos(k*Math.PI/2)*s,Math.sin(k*Math.PI/2)*s);
        pCtx.lineTo(Math.cos((k*Math.PI/2)+Math.PI/4)*s*0.4,Math.sin((k*Math.PI/2)+Math.PI/4)*s*0.4);
      }
      pCtx.closePath();pCtx.fill();
    }else if(p.type==='glow'){
      const gr=pCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2);
      gr.addColorStop(0,p.color);gr.addColorStop(1,'transparent');
      pCtx.fillStyle=gr;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*2,0,Math.PI*2);pCtx.fill();
    }else{
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
      pCtx.fillStyle=p.color;pCtx.shadowColor=p.color;pCtx.shadowBlur=p.size*2;pCtx.fill();
    }
    pCtx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING ENGINE
// ═══════════════════════════════════════════════════════════════
function drawStroke(x1,y1,x2,y2){
  const mode=BRUSH_MODES[brushModeIdx];
  dCtx.save();
  dCtx.lineCap='round';dCtx.lineJoin='round';

  if(mode==='MARKER'){
    dCtx.lineWidth=brushSize;
    dCtx.strokeStyle=hexToRgba(brushColor,0.92);
    dCtx.shadowColor='transparent';dCtx.shadowBlur=0;
    dCtx.beginPath();dCtx.moveTo(x1,y1);dCtx.lineTo(x2,y2);dCtx.stroke();
  }else if(mode==='ERASER'){
    dCtx.globalCompositeOperation='destination-out';
    dCtx.lineWidth=brushSize*2.5;
    dCtx.strokeStyle='rgba(0,0,0,1)';
    dCtx.beginPath();dCtx.moveTo(x1,y1);dCtx.lineTo(x2,y2);dCtx.stroke();
  }else if(mode==='CHALK'){
    dCtx.globalAlpha=0.4;
    for(let i=0;i<5;i++){
      const ox=(Math.random()-0.5)*brushSize*0.7;
      const oy=(Math.random()-0.5)*brushSize*0.7;
      dCtx.lineWidth=Math.random()*brushSize*0.5+1;
      dCtx.strokeStyle=hexToRgba(brushColor,0.3+Math.random()*0.4);
      dCtx.beginPath();dCtx.moveTo(x1+ox,y1+oy);dCtx.lineTo(x2+ox,y2+oy);dCtx.stroke();
    }
  }else if(mode==='SPRAY'){
    const density=Math.ceil(brushSize*2.5);
    const [r,g,b]=hexToRgb(brushColor);
    for(let i=0;i<density;i++){
      const angle=Math.random()*Math.PI*2;
      const radius=Math.random()*brushSize*1.8;
      const mx=(x1+x2)/2+Math.cos(angle)*radius;
      const my=(y1+y2)/2+Math.sin(angle)*radius;
      dCtx.beginPath();dCtx.arc(mx,my,Math.random()*1.5+0.3,0,Math.PI*2);
      dCtx.fillStyle=`rgba(${r},${g},${b},${Math.random()*0.6+0.2})`;
      dCtx.fill();
    }
  }else if(mode==='GLITTER'){
    dCtx.lineWidth=brushSize*0.6;
    dCtx.strokeStyle=hexToRgba(brushColor,0.6);
    dCtx.shadowColor=brushColor;dCtx.shadowBlur=brushSize;
    dCtx.beginPath();dCtx.moveTo(x1,y1);dCtx.lineTo(x2,y2);dCtx.stroke();
    for(let i=0;i<4;i++){
      const t=Math.random();
      const gx=x1+(x2-x1)*t+(Math.random()-0.5)*brushSize;
      const gy=y1+(y2-y1)*t+(Math.random()-0.5)*brushSize;
      const s=Math.random()*3+1;
      dCtx.save();dCtx.translate(gx,gy);dCtx.rotate(Math.random()*Math.PI*2);
      dCtx.fillStyle=brushColor;dCtx.shadowBlur=10;
      dCtx.fillRect(-s/2,-s*1.5,s,s*3);
      dCtx.fillRect(-s*1.5,-s/2,s*3,s);
      dCtx.restore();
    }
  }else if(mode==='NEON'){
    // Triple layered neon
    const layers=[
      {w:brushSize*3,a:0.03,blur:brushSize*3},
      {w:brushSize*1.2,a:0.5,blur:brushSize},
      {w:brushSize*0.5,a:1.0,blur:2}
    ];
    for(const l of layers){
      dCtx.lineWidth=l.w;dCtx.globalAlpha=l.a;
      dCtx.strokeStyle=brushColor;
      dCtx.shadowColor=brushColor;dCtx.shadowBlur=l.blur;
      dCtx.beginPath();dCtx.moveTo(x1,y1);dCtx.lineTo(x2,y2);dCtx.stroke();
    }
    // white core
    dCtx.lineWidth=1;dCtx.globalAlpha=0.9;
    dCtx.strokeStyle='rgba(255,255,255,0.9)';dCtx.shadowBlur=0;
    dCtx.beginPath();dCtx.moveTo(x1,y1);dCtx.lineTo(x2,y2);dCtx.stroke();
  }else{
    // GLOW (default)
    dCtx.lineWidth=brushSize;dCtx.strokeStyle=brushColor;
    dCtx.shadowColor=brushColor;dCtx.shadowBlur=brushSize*1.2;
    dCtx.beginPath();dCtx.moveTo(x1,y1);dCtx.lineTo(x2,y2);dCtx.stroke();
  }
  dCtx.restore();
}

// Undo system — snapshot canvas
let undoStack=[];
function pushUndo(){
  if(undoStack.length>20)undoStack.shift();
  undoStack.push(dCtx.getImageData(0,0,drawCanvas.width,drawCanvas.height));
}
function undo(){
  if(undoStack.length===0){toast('NOTHING TO UNDO');return;}
  dCtx.putImageData(undoStack.pop(),0,0);
  toast('UNDO ◀');playSelect();
}

// ═══════════════════════════════════════════════════════════════
//  HUD HELPERS
// ═══════════════════════════════════════════════════════════════
const CYAN='rgba(0,229,255,1)',CYAN2='rgba(0,229,255,0.55)',CYAN3='rgba(0,229,255,0.18)';
const RED='#ff1744',GREEN='#69ff47',GOLD='rgba(255,200,60,0.8)';

function hudText(txt,x,y,size=11,color=CYAN2,align='left',shadow=false){
  uCtx.save();
  uCtx.font=`${size}px 'Share Tech Mono',monospace`;
  uCtx.fillStyle=color;uCtx.textAlign=align;
  if(shadow){uCtx.shadowColor=color;uCtx.shadowBlur=8;}
  uCtx.fillText(txt,x,y);
  uCtx.restore();
}

function hudLine(x1,y1,x2,y2,color=CYAN3,w=1){
  uCtx.save();
  uCtx.strokeStyle=color;uCtx.lineWidth=w;
  uCtx.shadowColor=color;uCtx.shadowBlur=3;
  uCtx.beginPath();uCtx.moveTo(x1,y1);uCtx.lineTo(x2,y2);uCtx.stroke();
  uCtx.restore();
}

function cornerBracket(x,y,w,h,color=CYAN2,size=20,lw=1.2){
  uCtx.save();
  uCtx.strokeStyle=color;uCtx.lineWidth=lw;uCtx.shadowColor=color;uCtx.shadowBlur=8;
  [[x,y+size,x,y,x+size,y],[x+w-size,y,x+w,y,x+w,y+size],
   [x,y+h-size,x,y+h,x+size,y+h],[x+w-size,y+h,x+w,y+h,x+w,y+h-size]].forEach(([x1,y1,mx,my,x2,y2])=>{
    uCtx.beginPath();uCtx.moveTo(x1,y1);uCtx.lineTo(mx,my);uCtx.lineTo(x2,y2);uCtx.stroke();
  });
  uCtx.restore();
}

function drawArc(x,y,r,a1,a2,color=CYAN2,lw=1){
  uCtx.save();
  uCtx.strokeStyle=color;uCtx.lineWidth=lw;
  uCtx.shadowColor=color;uCtx.shadowBlur=8;
  uCtx.beginPath();uCtx.arc(x,y,r,a1,a2);uCtx.stroke();
  uCtx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ═══════════════════════════════════════════════════════════════
//  HAND SKELETON
// ═══════════════════════════════════════════════════════════════
function drawHandSkeleton(lm,W,H,g){
  const now=performance.now();
  const SKEL_COLORS={
    [G.DRAW]:'rgba(0,229,255,0.8)',
    [G.COLOR]:'rgba(213,0,249,0.8)',
    [G.SIZE]:'rgba(105,255,71,0.8)',
    [G.FIST]:'rgba(255,23,68,0.8)',
    [G.SAVE]:'rgba(255,234,0,0.8)',
    [G.MODE]:'rgba(255,145,0,0.8)',
    [G.NONE]:'rgba(0,229,255,0.3)',
  };
  const skelColor=SKEL_COLORS[g]||'rgba(0,229,255,0.3)';
  const pts=lm.map(p=>({x:(1-p.x)*W,y:p.y*H,z:p.z}));

  // Draw bones with depth
  uCtx.save();uCtx.lineCap='round';
  for(const[a,b]of CONNECTIONS){
    const pa=pts[a],pb=pts[b];
    const depth=Math.max(0,(pa.z+pb.z)*0.5+0.12);
    uCtx.strokeStyle=skelColor;
    uCtx.lineWidth=Math.max(1,2.8-depth*5);
    uCtx.shadowColor=skelColor.replace(/[\d.]+\)$/,'1)');uCtx.shadowBlur=5;
    uCtx.globalAlpha=Math.max(0.25,1-depth*3.5);
    uCtx.beginPath();uCtx.moveTo(pa.x,pa.y);uCtx.lineTo(pb.x,pb.y);uCtx.stroke();
  }
  uCtx.restore();

  // Landmark dots
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const isTip=[4,8,12,16,20].includes(i);
    const r=isTip?5.5:2.5;
    const gColor=skelColor.replace(/[\d.]+\)$/,'1)');
    uCtx.save();
    uCtx.beginPath();uCtx.arc(p.x,p.y,r,0,Math.PI*2);
    uCtx.fillStyle=isTip?gColor:'rgba(255,255,255,0.75)';
    uCtx.shadowColor=gColor;uCtx.shadowBlur=isTip?16:6;
    uCtx.fill();
    uCtx.restore();
    if(LM_LABELS[i]){
      hudText(LM_LABELS[i],p.x,p.y+(i===0?18:-20),8,'rgba(0,229,255,0.45)','center');
    }
  }

  // Bounding box
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const bx=Math.min(...xs)-18,by=Math.min(...ys)-18;
  const bw=Math.max(...xs)-bx+18,bh=Math.max(...ys)-by+18;
  cornerBracket(bx,by,bw,bh,skelColor.replace(/[\d.]+\)$/,'0.55)'),12,1);

  // Wrist label
  const wrist=pts[0];
  uCtx.save();
  uCtx.font="bold 10px 'Share Tech Mono',monospace";
  uCtx.fillStyle='rgba(0,229,255,0.75)';uCtx.textAlign='center';
  uCtx.shadowColor='rgba(0,229,255,0.8)';uCtx.shadowBlur=8;
  uCtx.fillText(`▸ ${g===G.NONE?'TRACKING':g.toUpperCase()} MODE`,wrist.x,wrist.y+30);
  uCtx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  PICKER PANELS (shared orb system)
// ═══════════════════════════════════════════════════════════════
function drawPickerPanel(orbs,hov,title,labelFn,isSelected,cx,cy,extraFn){
  const W=uiCanvas.width,H=uiCanvas.height;

  // Dim
  uCtx.save();uCtx.fillStyle='rgba(0,3,12,0.72)';uCtx.fillRect(0,0,W,H);uCtx.restore();

  // Panel bg
  const pad=32;
  const xs=orbs.map(o=>o.x-o.r),xe=orbs.map(o=>o.x+o.r);
  const ys=orbs.map(o=>o.y-o.r),ye=orbs.map(o=>o.y+o.r);
  const px=Math.min(...xs)-pad,py=Math.min(...ys)-pad;
  const pw=Math.max(...xe)+pad-px,ph=Math.max(...ye)+pad-py;

  uCtx.save();
  roundRect(uCtx,px,py,pw,ph,8);
  uCtx.fillStyle='rgba(0,8,22,0.82)';uCtx.fill();
  uCtx.strokeStyle='rgba(0,180,255,0.25)';uCtx.lineWidth=1;uCtx.stroke();
  uCtx.restore();
  cornerBracket(px,py,pw,ph,'rgba(0,229,255,0.4)',12,1);

  // Title
  uCtx.save();
  uCtx.font="bold 11px 'Share Tech Mono',monospace";
  uCtx.fillStyle='rgba(0,229,255,0.8)';uCtx.textAlign='center';
  uCtx.shadowColor='rgba(0,229,255,0.8)';uCtx.shadowBlur=10;
  uCtx.fillText('◈  '+title+'  ◈',W/2,py-14);
  uCtx.restore();

  // Orbs
  for(let i=0;i<orbs.length;i++){
    const o=orbs[i];
    const isH=i===hov,isSel=isSelected(o,i);
    const sc=isH?1.3:1;

    // Aura
    uCtx.save();
    const gr=uCtx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*sc+24);
    gr.addColorStop(0,hexToRgba(typeof o.color==='string'?o.color:brushColor,isH?0.3:0.08));
    gr.addColorStop(1,'transparent');
    uCtx.fillStyle=gr;
    uCtx.beginPath();uCtx.arc(o.x,o.y,o.r*sc+24,0,Math.PI*2);uCtx.fill();
    uCtx.restore();

    // Orb body
    uCtx.save();
    uCtx.beginPath();uCtx.arc(o.x,o.y,o.r*sc,0,Math.PI*2);
    const fc=typeof o.color==='string'?o.color:brushColor;
    if(typeof o.color==='string'){
      uCtx.fillStyle=o.color;
    }else{
      uCtx.fillStyle='rgba(0,15,30,0.85)';
    }
    uCtx.shadowColor=typeof o.color==='string'?o.color:brushColor;
    uCtx.shadowBlur=isH?40:15;
    uCtx.fill();
    uCtx.restore();

    // Selection ring
    if(isSel){
      uCtx.save();
      uCtx.beginPath();uCtx.arc(o.x,o.y,o.r*sc+8,0,Math.PI*2);
      uCtx.strokeStyle='rgba(255,255,255,0.9)';uCtx.lineWidth=2;
      uCtx.shadowColor='white';uCtx.shadowBlur=10;uCtx.stroke();
      uCtx.restore();
    }

    // Hover ticks
    if(isH){
      uCtx.save();
      for(let t=0;t<12;t++){
        const ang=t*Math.PI/6;
        const r1=o.r*sc+12,r2=o.r*sc+(t%3===0?20:15);
        uCtx.strokeStyle=t%3===0?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.3)';
        uCtx.lineWidth=t%3===0?1.5:0.8;
        uCtx.beginPath();
        uCtx.moveTo(o.x+Math.cos(ang)*r1,o.y+Math.sin(ang)*r1);
        uCtx.lineTo(o.x+Math.cos(ang)*r2,o.y+Math.sin(ang)*r2);
        uCtx.stroke();
      }
      uCtx.restore();
    }

    // Extra content inside orb
    if(extraFn)extraFn(o,i,isH,isSel,sc);

    // Label
    uCtx.save();
    uCtx.font=`${isH?10:9}px 'Share Tech Mono',monospace`;
    uCtx.fillStyle=isH?'rgba(255,255,255,0.9)':'rgba(0,229,255,0.5)';
    uCtx.textAlign='center';
    if(isH){uCtx.shadowColor='rgba(255,255,255,0.8)';uCtx.shadowBlur=6;}
    uCtx.fillText(labelFn(o,i),o.x,o.y+o.r*sc+18);
    uCtx.restore();
  }

  // Connector line
  if(hov>=0){
    const o=orbs[hov];
    uCtx.save();uCtx.setLineDash([4,6]);
    uCtx.strokeStyle='rgba(0,229,255,0.35)';uCtx.lineWidth=1;
    uCtx.beginPath();uCtx.moveTo(cx,cy);uCtx.lineTo(o.x,o.y);uCtx.stroke();
    uCtx.setLineDash([]);uCtx.restore();
  }
}

  hudText(`FPS: ${fps}   GESTURE: ${g.toUpperCase()}`,tlx,tly+46,9,'rgba(0,229,255,0.4)');
  hudText(`MODE: ${BRUSH_MODES[brushModeIdx]}   BRUSH: ${brushSize}px   BG: ${BG_THEMES[bgThemeIdx]}`,tlx,tly+60,9,'rgba(0,229,255,0.4)');
  hudText(`UNDO STACK: ${undoStack.length}`,tlx,tly+74,8,'rgba(0,229,255,0.25)');

  // ── Top-right: brush preview ──
  const trx=W-26,trY=26;
  uCtx.save();
  roundRect(uCtx,trx-150,trY-8,162,80,4);
  uCtx.fillStyle='rgba(0,5,18,0.65)';uCtx.fill();
  uCtx.strokeStyle='rgba(0,229,255,0.12)';uCtx.lineWidth=0.8;uCtx.stroke();
  uCtx.restore();
  hudText('BRUSH',trx,trY+12,9,'rgba(0,229,255,0.45)','right');
  hudLine(trx-140,trY+18,trx,trY+18,CYAN3);
  // Color swatch with glow
  uCtx.save();
  uCtx.beginPath();uCtx.arc(trx-14,trY+38,14,0,Math.PI*2);
  uCtx.fillStyle=brushColor;uCtx.shadowColor=brushColor;uCtx.shadowBlur=20;uCtx.fill();
  uCtx.strokeStyle='rgba(255,255,255,0.2)';uCtx.lineWidth=1;uCtx.stroke();
  uCtx.restore();
  hudText(`${brushSize}px  ${BRUSH_MODES[brushModeIdx]}`,trx-32,trY+38,10,'rgba(0,229,255,0.6)','right');
  hudText(brushColor.toUpperCase(),trx,trY+54,8,hexToRgba(brushColor,0.8),'right');
  hudText(`UNDO: ${undoStack.length} LEVELS`,trx,trY+68,8,'rgba(0,229,255,0.3)','right');

  // ── Bottom-left: gesture guide ──
  const blx=26,bly=H-26;
  const guides=[
    ['☝','INDEX','DRAW'],
    ['✌','INDEX+MID','COLOR'],
    ['🤟','IDX+MID+RING','SIZE'],
    ['🖐','4 FINGERS (NO THUMB)','MODE'],
    ['✊','FIST HOLD','CLEAR'],
    ['🤙','PINKY ONLY','SAVE'],
    ['✊✊→🖐🖐','BOTH HANDS','BG THEME'],
  ];
  uCtx.save();
  roundRect(uCtx,blx-8,bly-guides.length*17-10,230,guides.length*17+16,4);
  uCtx.fillStyle='rgba(0,5,18,0.65)';uCtx.fill();
  uCtx.strokeStyle='rgba(0,229,255,0.1)';uCtx.lineWidth=0.8;uCtx.stroke();
  uCtx.restore();
  guides.forEach(([ico,key,val],i)=>{
    const gy=bly-(guides.length-1-i)*17;
    const isActive=(
      (val==='DRAW'&&g===G.DRAW)||(val==='COLOR'&&g===G.COLOR)||
      (val==='SIZE'&&g===G.SIZE)||(val==='MODE'&&g===G.MODE)||
      (val==='CLEAR'&&g===G.FIST)||(val==='SAVE'&&g===G.SAVE)||
      (val==='BG THEME'&&prevGesture===G.FIST&&g===G.MODE)
    );
    hudText(`${ico}  ${key}`,blx,gy,9,isActive?'rgba(0,229,255,0.9)':'rgba(0,229,255,0.28)');
    hudText(`→ ${val}`,blx+118,gy,9,isActive?hexToRgba(brushColor,0.9):'rgba(0,229,255,0.4)');
    if(isActive){
      uCtx.save();uCtx.fillStyle=hexToRgba(brushColor,0.08);
      uCtx.fillRect(blx-4,gy-12,222,14);uCtx.restore();
    }
  });

  // ── Bottom-right: clock + stats ──
  const brx=W-26,brY=H-26;
  const d=new Date();
  const ts=d.toTimeString().slice(0,8);
  uCtx.save();
  roundRect(uCtx,brx-190,brY-54,202,62,4);
  uCtx.fillStyle='rgba(0,5,18,0.65)';uCtx.fill();
  uCtx.strokeStyle='rgba(0,229,255,0.12)';uCtx.lineWidth=0.8;uCtx.stroke();
  uCtx.restore();
  hudText(ts,brx,brY-38,20,'rgba(0,229,255,0.7)','right',true);
  hudText(d.toDateString().toUpperCase(),brx,brY-16,9,'rgba(0,229,255,0.35)','right');
  hudText(`PARTICLES: ${particles.length}`,brx,brY,8,'rgba(0,229,255,0.2)','right');

  // Decorative corner arcs
  const t=now*0.0008;
  drawArc(W-52,52,28,t,(t+1.4),'rgba(0,229,255,0.12)');
  drawArc(52,H-52,28,Math.PI+t,Math.PI+(t+1.4),'rgba(0,229,255,0.12)');

  if(!lm){
    // Scanning animation
    const sc=now*0.001;
    drawArc(W/2,H/2,72,sc%Math.PI*2,(sc+1.5)%Math.PI*2,'rgba(0,229,255,0.25)',1.5);
    drawArc(W/2,H/2,80,-sc%Math.PI*2,(-sc+1.2)%Math.PI*2,'rgba(0,150,255,0.12)',1);
    drawArc(W/2,H/2,88,(sc*0.7)%Math.PI*2,((sc*0.7)+0.8)%Math.PI*2,'rgba(0,229,255,0.08)',0.8);
    uCtx.save();
    uCtx.font="bold 13px 'Share Tech Mono',monospace";
    uCtx.fillStyle='rgba(0,229,255,0.5)';uCtx.textAlign='center';
    uCtx.shadowColor='rgba(0,229,255,0.8)';uCtx.shadowBlur=10;
    uCtx.fillText('◈  SCANNING FOR HAND…',W/2,H/2+110);
    uCtx.restore();
    return;
  }

  // ── Hand skeleton ──
  drawHandSkeleton(lm,W,H,g);

  // Index finger position
  const cx=(1-lm[8].x)*W,cy=lm[8].y*H;

  // ── Cursor ──
  const mode=BRUSH_MODES[brushModeIdx];
  const pulse=0.5+0.5*Math.sin(now*0.009);
  uCtx.save();
  if(g===G.DRAW){
    // Active draw cursor
    uCtx.beginPath();uCtx.arc(cx,cy,Math.max(brushSize/2,4),0,Math.PI*2);
    uCtx.fillStyle=hexToRgba(brushColor,0.9);
    uCtx.shadowColor=brushColor;uCtx.shadowBlur=brushSize*2;uCtx.fill();
    // Outer ring
    uCtx.beginPath();uCtx.arc(cx,cy,brushSize/2+8+pulse*4,0,Math.PI*2);
    uCtx.strokeStyle=hexToRgba(brushColor,0.4);uCtx.lineWidth=1.5;
    uCtx.shadowBlur=10;uCtx.stroke();
    // White core
    uCtx.beginPath();uCtx.arc(cx,cy,2,0,Math.PI*2);
    uCtx.fillStyle='white';uCtx.shadowBlur=4;uCtx.fill();
  }else if(g===G.NONE||g===G.COLOR||g===G.SIZE||g===G.MODE){
    // Navigation cursor
    uCtx.beginPath();uCtx.arc(cx,cy,6,0,Math.PI*2);
    uCtx.fillStyle=hexToRgba(brushColor,0.8);
    uCtx.shadowColor=brushColor;uCtx.shadowBlur=16;uCtx.fill();
    drawArc(cx,cy,14+pulse*3,-Math.PI/2,Math.PI*1.5,hexToRgba(brushColor,0.35),1);
  }else{
    uCtx.beginPath();uCtx.arc(cx,cy,8,0,Math.PI*2);
    uCtx.fillStyle=hexToRgba(brushColor,0.7);
    uCtx.shadowColor=brushColor;uCtx.shadowBlur=20;uCtx.fill();
  }
  // Crosshair
  if(g!==G.FIST){
    const ch=20;
    [[cx-ch-6,cy,cx-brushSize/2-9,cy],[cx+brushSize/2+9,cy,cx+ch+6,cy],
     [cx,cy-ch-6,cx,cy-brushSize/2-9],[cx,cy+brushSize/2+9,cx,cy+ch+6]
    ].forEach(([x1,y1,x2,y2])=>{
      uCtx.strokeStyle=hexToRgba(brushColor,0.5);uCtx.lineWidth=1;uCtx.shadowBlur=4;
      uCtx.beginPath();uCtx.moveTo(x1,y1);uCtx.lineTo(x2,y2);uCtx.stroke();
    });
  }
  uCtx.restore();

  // ── PICKERS — no sounds at all on hover ──
  if(g===G.COLOR){
    let hov=-1;
    for(let i=0;i<colorOrbs.length;i++)
      if(Math.hypot(cx-colorOrbs[i].x,cy-colorOrbs[i].y)<colorOrbs[i].r){hov=i;break;}
    lastColorHov=hov;
    if(hov>=0&&colorOrbs[hov].color!==brushColor&&selectCool<now){
      brushColor=colorOrbs[hov].color;selectCool=now+700;
      lastSelectedColor=brushColor;playSelect();toast('COLOR: '+PALETTE_NAMES[hov]);
    }
    drawPickerPanel(colorOrbs,hov,'COLOR INTERFACE',(o)=>o.name,(o)=>o.color===brushColor,cx,cy,(o,i,isH,isSel,sc)=>{});
  }else{lastColorHov=-1;}

  if(g===G.SIZE){
    let hov=-1;
    for(let i=0;i<sizeOrbs.length;i++)
      if(Math.hypot(cx-sizeOrbs[i].x,cy-sizeOrbs[i].y)<sizeOrbs[i].r){hov=i;break;}
    lastSizeHov=hov;
    if(hov>=0&&sizeOrbs[hov].size!==brushSize&&selectCool<now){
      brushSize=sizeOrbs[hov].size;selectCool=now+700;
      lastSelectedSize=brushSize;playSelect();toast(`BRUSH SIZE: ${brushSize}px`);
    }
    drawPickerPanel(sizeOrbs,hov,'BRUSH SIZE',(o)=>o.size+'px',(o)=>o.size===brushSize,cx,cy,(o,i,isH,isSel,sc)=>{
      uCtx.save();
      uCtx.beginPath();uCtx.arc(o.x,o.y,Math.max(3,o.size/2)*(isH?1.2:1),0,Math.PI*2);
      uCtx.fillStyle=brushColor;uCtx.shadowColor=brushColor;uCtx.shadowBlur=isH?20:8;uCtx.fill();
      uCtx.restore();
    });
  }else{lastSizeHov=-1;}

  if(g===G.MODE){
    let hov=-1;
    for(let i=0;i<modeOrbs.length;i++)
      if(Math.hypot(cx-modeOrbs[i].x,cy-modeOrbs[i].y)<modeOrbs[i].r){hov=i;break;}
    lastModeHov=hov;
    if(hov>=0&&hov!==brushModeIdx&&selectCool<now){
      brushModeIdx=hov;selectCool=now+700;
      lastSelectedMode=brushModeIdx;playSelect();toast('MODE: '+BRUSH_MODES[hov]);
    }
    drawPickerPanel(modeOrbs,hov,'BRUSH MODE',(o)=>o.mode,(o,i)=>i===brushModeIdx,cx,cy,(o,i,isH,isSel,sc)=>{
      uCtx.save();
      uCtx.font=`${isH?20:16}px 'Share Tech Mono',monospace`;
      uCtx.fillStyle=isH?'rgba(255,255,255,0.95)':'rgba(0,229,255,0.7)';
      uCtx.textAlign='center';uCtx.textBaseline='middle';
      uCtx.shadowColor=isH?'white':'rgba(0,229,255,0.8)';uCtx.shadowBlur=isH?12:5;
      uCtx.fillText(o.icon,o.x,o.y);uCtx.textBaseline='alphabetic';
      uCtx.restore();
    });
  }else{lastModeHov=-1;}

  // ── FIST CLEAR ──
  if(g===G.FIST){
    if(!fistStart){fistStart=now;}
    const prog=Math.min(1,(now-fistStart)/FIST_HOLD);
    const fc=lm[9];
    const fx=(1-fc.x)*W,fy=fc.y*H;
    const rr=60;

    uCtx.save();
    uCtx.fillStyle=`rgba(255,0,0,${prog*0.1})`;uCtx.fillRect(0,0,W,H);
    // Background ring
    uCtx.beginPath();uCtx.arc(fx,fy,rr,0,Math.PI*2);
    uCtx.strokeStyle='rgba(255,30,70,0.15)';uCtx.lineWidth=8;uCtx.stroke();
    // Progress arc
    uCtx.beginPath();uCtx.arc(fx,fy,rr,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
    uCtx.strokeStyle=`rgba(255,30,70,${0.6+prog*0.4})`;uCtx.lineWidth=6;
    uCtx.lineCap='round';uCtx.shadowColor=RED;uCtx.shadowBlur=20;uCtx.stroke();
    // Inner fill
    if(prog>0){
      const inFill=uCtx.createRadialGradient(fx,fy,0,fx,fy,rr);
      inFill.addColorStop(0,`rgba(255,30,70,${prog*0.12})`);inFill.addColorStop(1,'transparent');
      uCtx.fillStyle=inFill;uCtx.beginPath();uCtx.arc(fx,fy,rr,0,Math.PI*2);uCtx.fill();
    }
    // Percentage
    uCtx.font="bold 16px 'Share Tech Mono',monospace";
    uCtx.fillStyle=`rgba(255,60,90,${0.7+prog*0.3})`;uCtx.textAlign='center';
    uCtx.fillText(`${Math.round(prog*100)}%`,fx,fy+6);
    uCtx.font="9px 'Share Tech Mono',monospace";
    uCtx.fillStyle='rgba(255,60,90,0.55)';
    uCtx.fillText('HOLD FIST TO CLEAR',fx,fy+rr+24);
    uCtx.restore();

    if(prog>=1){
      pushUndo();
      dCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
      particles.length=0;
      fistStart=null;
      toast('CANVAS CLEARED');
      playTone(200,'sawtooth',0.3,0.1);
    }
  }else{fistStart=null;}

  // SAVE on gesture entry
  if(g===G.SAVE&&prevGesture!==G.SAVE){
    saveDrawing();
    toast('✓ DRAWING SAVED');
    playSelect();
  }
}

// ═══════════════════════════════════════════════════════════════
//  SAVE
// ═══════════════════════════════════════════════════════════════
function saveDrawing(){
  const tmp=document.createElement('canvas');
  tmp.width=drawCanvas.width;tmp.height=drawCanvas.height;
  const tc=tmp.getContext('2d');
  tc.save();tc.scale(-1,1);tc.drawImage(drawCanvas,-tmp.width,0);tc.restore();
  const a=document.createElement('a');
  a.download='kuttan-airdraw-'+Date.now()+'.png';
  a.href=tmp.toDataURL('image/png');a.click();
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(now){
  requestAnimationFrame(loop);
  if(!handLandmarker||video.readyState<2)return;
  if(now-lastFrameTime<16)return;
  lastFrameTime=now;

  frameCount++;
  if(now-fpsLast>=1000){fps=Math.round(frameCount*1000/(now-fpsLast));frameCount=0;fpsLast=now;}

  drawBgTheme(now);

  const results=handLandmarker.detectForVideo(video,now);
  const allLm=results?.landmarks||[];
  const lm=allLm[0]||null;   // primary hand for drawing/gestures
  const lm2=allLm[1]||null;  // second hand for BG toggle only
  handDetected=!!lm;

  // ── BG TOGGLE: both hands fist → both hands open ──
  if(lm&&lm2){
    const h1Fist=isFistGesture(lm),h2Fist=isFistGesture(lm2);
    const h1Open=isOpenGesture(lm),h2Open=isOpenGesture(lm2);
    if(h1Fist&&h2Fist){
      bothFistSeen=true;
    }
    if(bothFistSeen&&h1Open&&h2Open){
      bothFistSeen=false;
      bgThemeIdx=(bgThemeIdx+1)%BG_THEMES.length;
      toast('BG: '+BG_THEMES[bgThemeIdx]);
      playSelect();
    }
  }else{
    bothFistSeen=false;
  }

  if(!lm){
    uCtx.clearRect(0,0,uiCanvas.width,uiCanvas.height);
    pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
    updateParticles();
    drawUI(null,G.NONE,now);
    isDrawing=false;prevX=prevY=null;gesture=G.NONE;
    return;
  }

  prevGesture=gesture;

  // Debounce: raw gesture must be stable for GESTURE_DEBOUNCE frames before committing
  const rawGesture=detectGesture(lm);
  if(rawGesture===pendingGesture){
    pendingFrames++;
  }else{
    pendingGesture=rawGesture;
    pendingFrames=1;
  }
  if(pendingFrames>=GESTURE_DEBOUNCE) gesture=pendingGesture;

  const W=uiCanvas.width,H=uiCanvas.height;
  const tipX=lm[8].x*W,tipY=lm[8].y*H;
  if(smoothX===null){smoothX=tipX;smoothY=tipY;}
  const dist=Math.hypot(tipX-smoothX,tipY-smoothY);
  const alpha=Math.min(0.7,0.3+dist*0.01);
  smoothX+=(tipX-smoothX)*alpha;
  smoothY+=(tipY-smoothY)*alpha;

  if(gesture===G.DRAW){
    if(!isDrawing){
      isDrawing=true;
      pushUndo();
      prevX=smoothX;prevY=smoothY;
    }else{
      drawStroke(prevX,prevY,smoothX,smoothY);
      prevX=smoothX;prevY=smoothY;
    }
  }else{
    if(isDrawing)isDrawing=false;
    prevX=prevY=null;
  }

  updateParticles();
  drawUI(lm,gesture,now);
}

// ═══════════════════════════════════════════════════════════════
//  BOOT SEQUENCE
// ═══════════════════════════════════════════════════════════════
async function boot(){
  const steps=[
    ['LOADING NEURAL ENGINE…',15],
    ['COMPILING GESTURE MATRIX…',35],
    ['CALIBRATING HAND SENSORS…',55],
    ['INITIALIZING PARTICLE FX…',72],
    ['STARTING CAMERA FEED…',85],
    ['MOUNTING HUD OVERLAY…',95],
    ['SYSTEM ONLINE — KUTTAN READY',100],
  ];

  for(const[msg,pct]of steps){
    bootMsg.textContent=msg;
    bootBar.style.width=pct+'%';
    await new Promise(r=>setTimeout(r,320+Math.random()*180));
  }

  try{
    const vision=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
    );
    handLandmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO",numHands:2
    });

    const stream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1920},height:{ideal:1080},facingMode:'user'},audio:false
    });
    video.srcObject=stream;
    await new Promise(r=>video.onloadedmetadata=()=>{video.play();r();});

    resize();
    cancelAnimationFrame(bootAnimFrame);
    bootEl.classList.add('fade');
    setTimeout(()=>{bootEl.style.display='none';},1400);
    requestAnimationFrame(loop);

    setTimeout(()=>toast('KUTTAN ONLINE — SYSTEM READY',3000),800);
    setTimeout(()=>toast('☝ DRAW  ✌ COLOR  🤟 SIZE  🖐 MODE  ✊ CLEAR  🤙 SAVE',5000),4200);

  }catch(e){
    bootMsg.textContent='⚠ ERROR: '+(e.message||'UNKNOWN FAULT');
    bootBar.style.background='#ff1744';
    console.error(e);
  }
}

boot();
</script>
